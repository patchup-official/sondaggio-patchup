<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sondaggio PatchUP</title>

<style>
body { font-family: Arial; margin:0; background:#fff; color:#111; }
.container { max-width:600px; margin:60px auto; padding:20px; }
h1 { color:#f47a20; }
.card { border:1px solid #eee; padding:20px; border-radius:12px; }
.opt { display:block; padding:10px; border:1px solid #ddd; margin:8px 0; cursor:pointer; }
.opt:hover { border-color:#f47a20; background:#fff5ec; }
button { background:#f47a20; color:#fff; padding:15px; width:100%; border:none; border-radius:8px; font-weight:bold; }
textarea { width:100%; height:100px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>Ciao!</h1>
<p>Amiamo davvero quello che facciamo. Questo sondaggio ci aiuta a migliorare.</p>

<div class="card" id="step-1">
<h3>Cosa cerchi davvero?</h3>

<label class="opt"><input type="checkbox"> Puoi fidarti</label>
<label class="opt"><input type="checkbox"> Rispondono subito</label>
<label class="opt"><input type="checkbox"> Soluzioni rapide</label>
<label class="opt"><input type="checkbox"> Supporto dopo acquisto</label>
<label class="opt"><input type="checkbox"> Spiegazioni semplici</label>

<button onclick="next(1)">Avanti</button>
</div>

<div class="card" id="step-2" style="display:none">
<h3>Problemi passati?</h3>

<label class="opt"><input type="checkbox"> Proposta sbagliata</label>
<label class="opt"><input type="checkbox"> Difficile contattarli</label>
<label class="opt"><input type="checkbox"> Disorganizzazione</label>
<label class="opt"><input type="checkbox"> Non hanno capito</label>
<label class="opt"><input type="checkbox"> Pensavano solo a vendere</label>

<button onclick="next(2)">Avanti</button>
</div>

<div class="card" id="step-3" style="display:none">
<h3>Il futuro?</h3>

<label class="opt"><input type="checkbox"> Polo tecnologico</label>
<label class="opt"><input type="checkbox"> Nuove tecnologie</label>
<label class="opt"><input type="checkbox"> Sicurezza dati</label>
<label class="opt"><input type="checkbox"> App dedicata</label>

<button onclick="next(3)">Avanti</button>
</div>

<div class="card" id="step-4" style="display:none">
<h3>Vuoi aggiungere qualcosa?</h3>

<textarea></textarea>

<button onclick="submitSurvey()">Invia</button>
</div>

</div>

<script>
function next(step){
  document.getElementById("step-"+step).style.display="none";
  document.getElementById("step-"+(step+1)).style.display="block";
}

function submitSurvey(){
  window.location.href="https://docs.google.com/forms/d/e/1FAIpQLSejCy0iKbOZ6vKeFMrn_YjAGn_WRnW8qnMV0V7w3aFVBAzzZw/viewform";
}
</script>

</body>
</html>
